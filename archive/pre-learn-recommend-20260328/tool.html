<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aether · 工具详情</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      @keyframes beam {
        0% {
          background-position: 0% 50%;
          opacity: 0.25;
        }
        40% {
          opacity: 0.85;
        }
        100% {
          background-position: 200% 50%;
          opacity: 0.25;
        }
      }
      .beam-line {
        background-size: 200% 100%;
        animation: beam 3.2s ease-in-out infinite;
      }
    </style>
  </head>
  <body class="bg-white text-neutral-900 dark:bg-neutral-950 dark:text-neutral-50 font-sans antialiased">
    <div class="fixed inset-0 -z-10 pointer-events-none">
      <div
        class="absolute inset-0 opacity-60 dark:opacity-40"
        style="
          background:
            radial-gradient(1200px 600px at 50% 0%, rgba(99,102,241,0.12), transparent 60%),
            radial-gradient(900px 500px at 15% 30%, rgba(34,197,94,0.10), transparent 55%),
            radial-gradient(900px 500px at 85% 35%, rgba(56,189,248,0.10), transparent 55%);
        "
      ></div>
      <div
        class="absolute inset-0 [mask-image:linear-gradient(to_bottom,black_70%,transparent_100%)]"
      >
        <div class="absolute left-1/2 top-0 -translate-x-1/2 w-[1100px] h-full">
          <div class="absolute left-1/2 top-20 -translate-x-1/2 w-[980px] h-px beam-line rounded-full"
            style="background-image:linear-gradient(90deg,transparent,rgba(99,102,241,0.65),rgba(34,197,94,0.55),transparent);"
          ></div>
          <div class="absolute left-1/2 top-44 -translate-x-1/2 w-[860px] h-px beam-line rounded-full"
            style="animation-delay: .8s;background-image:linear-gradient(90deg,transparent,rgba(56,189,248,0.65),rgba(167,139,250,0.55),transparent);"
          ></div>
          <div class="absolute left-1/2 top-72 -translate-x-1/2 w-[740px] h-px beam-line rounded-full"
            style="animation-delay: 1.4s;background-image:linear-gradient(90deg,transparent,rgba(245,158,11,0.65),rgba(236,72,153,0.45),transparent);"
          ></div>
        </div>
      </div>
    </div>

    <header class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8 flex items-center justify-between">
      <a href="./index.html" class="text-base font-semibold tracking-tighter uppercase text-black dark:text-white">
        Aether
      </a>
      <a
        href="./index.html"
        class="text-sm font-medium text-neutral-600 dark:text-neutral-300 hover:text-black dark:hover:text-white transition-colors"
      >
        返回工具库
      </a>
    </header>

    <main class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 pb-16">
      <div class="grid lg:grid-cols-12 gap-10 items-start">
        <!-- 左侧：主视觉预览（参照截图的“大图预览”布局） -->
        <section class="lg:col-span-7">
          <div
            class="rounded-2xl border border-neutral-200/70 dark:border-neutral-800 overflow-hidden bg-neutral-50 dark:bg-neutral-900/40 shadow-[0_30px_80px_-50px_rgba(0,0,0,0.35)]"
          >
            <div class="aspect-[16/10] grid grid-cols-12 grid-rows-6 gap-2 p-4 sm:p-5">
              <div id="previewA" class="col-span-5 row-span-4 rounded-xl bg-cover bg-center"></div>
              <div id="previewB" class="col-span-7 row-span-4 rounded-xl bg-cover bg-center"></div>
              <div id="previewC" class="col-span-7 row-span-2 rounded-xl bg-cover bg-center"></div>
              <div class="col-span-5 row-span-2 rounded-xl border border-neutral-200/70 dark:border-neutral-800 bg-white/70 dark:bg-neutral-950/40 p-4">
                <div class="text-xs text-neutral-500 dark:text-neutral-400">为什么这工具值得收藏</div>
                <ul id="highlights" class="mt-3 space-y-2 text-sm text-neutral-700 dark:text-neutral-200"></ul>
              </div>
            </div>
          </div>

          <div class="mt-6 flex flex-wrap gap-2" id="tags"></div>
        </section>

        <!-- 右侧：标题/简介/按钮（参照 gola 的详情页信息结构） -->
        <aside class="lg:col-span-5">
          <h1 id="title" class="text-4xl sm:text-5xl font-semibold tracking-tight text-black dark:text-white"></h1>
          <p id="tagline" class="mt-3 text-base text-neutral-600 dark:text-neutral-300"></p>
          <p id="description" class="mt-6 text-sm sm:text-base leading-relaxed text-neutral-600 dark:text-neutral-300"></p>

          <div class="mt-8 flex flex-col sm:flex-row gap-3">
            <a
              id="openBtn"
              href="#"
              target="_blank"
              rel="noopener noreferrer"
              class="inline-flex items-center justify-center gap-2 rounded-xl px-5 py-3 text-sm font-semibold bg-black text-white dark:bg-white dark:text-black hover:opacity-90 transition-opacity"
            >
              打开官网
              <span aria-hidden="true">↗</span>
            </a>
            <a
              href="./index.html"
              class="inline-flex items-center justify-center gap-2 rounded-xl px-5 py-3 text-sm font-medium border border-neutral-200 dark:border-neutral-800 text-neutral-700 dark:text-neutral-200 hover:bg-neutral-50 dark:hover:bg-neutral-900 transition-colors"
            >
              继续浏览
            </a>
          </div>

          <div class="mt-8 rounded-2xl border border-neutral-200/70 dark:border-neutral-800 bg-white/70 dark:bg-neutral-950/30 p-5">
            <div class="text-xs text-neutral-500 dark:text-neutral-400">小提示</div>
            <div class="mt-2 text-sm text-neutral-700 dark:text-neutral-200 leading-relaxed">
              你可以先在这里看简短介绍，再通过“打开官网”跳转外链，避免误点直接离开页面。
            </div>
          </div>
        </aside>
      </div>
    </main>

    <script src="./tools.js"></script>
    <script>
      const params = new URLSearchParams(location.search);
      const id = params.get("id");
      const tool = (window.AIGC_TOOLS || []).find((t) => t.id === id);
      const ensureImages = window.AIGC_ENSURE_TOOL_IMAGES || ((t) => t.images || { a: "", b: "" });

      function setText(id, value) {
        const el = document.getElementById(id);
        if (el) el.textContent = value ?? "";
      }

      if (!tool) {
        setText("title", "未找到该工具");
        setText("tagline", "请返回工具库重新选择");
        document.getElementById("openBtn").classList.add("opacity-50", "pointer-events-none");
      } else {
        setText("title", tool.name);
        setText("tagline", tool.tagline);
        setText("description", tool.description);
        const openBtn = document.getElementById("openBtn");
        openBtn.href = tool.url;

        const tags = document.getElementById("tags");
        tags.innerHTML = "";
        const cat = (window.AIGC_CATEGORIES || []).find((c) => c.id === tool.category);
        const tagItems = [
          { label: cat ? cat.label : tool.category, tone: "border-indigo-200 text-indigo-700 bg-indigo-50 dark:border-indigo-900/50 dark:text-indigo-200 dark:bg-indigo-950/30" },
          ...(tool.highlights || []).map((h) => ({
            label: h,
            tone: "border-neutral-200 text-neutral-700 bg-white/70 dark:border-neutral-800 dark:text-neutral-200 dark:bg-neutral-950/30",
          })),
        ];
        for (const t of tagItems) {
          const span = document.createElement("span");
          span.className = `text-xs px-3 py-1.5 rounded-full border ${t.tone}`;
          span.textContent = t.label;
          tags.appendChild(span);
        }

        // 预览图：用工具卡片的两张图做拼贴变体
        const imgs = ensureImages(tool);
        const a = imgs?.a;
        const b = imgs?.b;
        document.getElementById("previewA").style.backgroundImage = `url("${a}")`;
        document.getElementById("previewB").style.backgroundImage = `url("${b}")`;
        document.getElementById("previewC").style.backgroundImage = `linear-gradient(135deg, rgba(99,102,241,.18), rgba(34,197,94,.12)), url("${a}")`;

        const highlights = document.getElementById("highlights");
        highlights.innerHTML = "";
        for (const h of tool.highlights || []) {
          const li = document.createElement("li");
          li.className = "flex items-start gap-2";
          li.innerHTML = `<span class="mt-1 inline-block h-1.5 w-1.5 rounded-full bg-indigo-500"></span><span>${h}</span>`;
          highlights.appendChild(li);
        }
      }
    </script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@300;400;500;600;700&display=swap" />
    <style>
      .font-bricolage { font-family: "Bricolage Grotesque", sans-serif !important; }
      .tool-card { transform: translateZ(0); }
      .tool-card:hover { transform: scale(1.03); }
      .tool-img-a { opacity: 1; }
      .tool-img-b { opacity: 0; }
      .tool-card:hover .tool-img-a { opacity: 0; transform: scale(1.05) rotate(-0.25deg); }
      .tool-card:hover .tool-img-b { opacity: 1; transform: scale(1.05) rotate(0.25deg); }
      .tool-img-layer { transition: opacity 260ms ease, transform 420ms ease; }
      .tools-curtain {
        position: relative;
        isolation: isolate;
        overflow: hidden;
        background: linear-gradient(
          165deg,
          rgba(255, 255, 255, 0.14) 0%,
          rgba(210, 214, 222, 0.12) 48%,
          rgba(255, 255, 255, 0.1) 100%
        );
        backdrop-filter: blur(14px) saturate(200%);
        -webkit-backdrop-filter: blur(14px) saturate(200%);
        border-top: 1px solid rgba(255, 255, 255, 0.42);
        border-bottom: 1px solid rgba(0, 0, 0, 0.06);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.55),
          inset 0 -1px 0 rgba(255, 255, 255, 0.06),
          0 4px 24px rgba(0, 0, 0, 0.04);
      }
      .tools-curtain::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.35);
        opacity: 0.9;
      }
      @media (prefers-color-scheme: dark) {
        .tools-curtain {
          background: linear-gradient(
            165deg,
            rgba(255, 255, 255, 0.08) 0%,
            rgba(180, 184, 192, 0.06) 50%,
            rgba(255, 255, 255, 0.05) 100%
          );
          backdrop-filter: blur(18px) saturate(185%);
          -webkit-backdrop-filter: blur(18px) saturate(185%);
          border-top-color: rgba(255, 255, 255, 0.22);
          border-bottom-color: rgba(0, 0, 0, 0.35);
          box-shadow:
            inset 0 1px 0 rgba(255, 255, 255, 0.18),
            inset 0 -1px 0 rgba(0, 0, 0, 0.35),
            0 8px 40px rgba(0, 0, 0, 0.35);
        }
        .tools-curtain::before {
          box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.12);
        }
      }
      .section-wide {
        width: 100%;
        max-width: min(88rem, calc(100vw - 2rem));
        margin-left: auto;
        margin-right: auto;
      }
    </style>
    <title>Browse all tools · Aether</title>
  </head>
  <body class="dark:bg-neutral-950 dark:text-neutral-50 font-sans antialiased selection:bg-neutral-200 dark:selection:bg-neutral-800 relative min-h-screen overflow-x-hidden bg-white text-neutral-900">
    <header class="relative z-10 section-wide px-4 sm:px-6 lg:px-8 py-8 flex items-center justify-between gap-4">
      <a href="home.html" class="text-base font-semibold tracking-tighter dark:text-white uppercase font-sans text-black hover:opacity-80 transition-opacity">Aether</a>
      <h1 class="text-lg sm:text-xl font-semibold text-black dark:text-white font-bricolage truncate">All tools</h1>
      <a href="home.html" class="rounded-full px-5 py-2 text-sm font-medium border border-neutral-200/80 dark:border-neutral-800 text-neutral-600 dark:text-neutral-300 hover:bg-neutral-50 dark:hover:bg-neutral-900 transition-colors font-sans shrink-0">Home</a>
    </header>

    <section id="tools" class="relative z-10 pb-16">
      <div class="section-wide px-4 sm:px-6 lg:px-8 pb-6">
        <div class="flex flex-col lg:flex-row lg:items-end lg:justify-between gap-6">
          <div>
            <h2 class="text-2xl sm:text-3xl font-semibold tracking-tight text-black dark:text-white font-bricolage">AIGC 工具导航</h2>
          </div>
          <div class="flex flex-col sm:flex-row gap-3 w-full lg:w-auto">
            <div class="relative w-full sm:w-[320px]">
              <div class="absolute inset-y-0 left-3 flex items-center text-neutral-400 pointer-events-none">
                <iconify-icon icon="solar:magnifer-bold-duotone" class="text-lg" stroke-width="1.5"></iconify-icon>
              </div>
              <input id="search" type="search" class="w-full pl-10 pr-4 py-2.5 rounded-full border border-neutral-200/70 dark:border-neutral-800 bg-white/80 dark:bg-neutral-950/40 text-sm outline-none focus:ring-2 focus:ring-indigo-500/30" autocomplete="off" />
            </div>
            <div class="flex flex-wrap gap-2">
              <button id="clearFilters" type="button" class="rounded-full px-5 py-2.5 border border-neutral-200/80 dark:border-neutral-800 text-sm font-medium text-neutral-700 dark:text-neutral-200 hover:bg-neutral-50 dark:hover:bg-neutral-900 transition-colors bg-white/70 dark:bg-neutral-950/30">清除筛选</button>
            </div>
          </div>
        </div>
      </div>

      <div class="w-full tools-curtain">
        <div class="section-wide px-4 sm:px-6 lg:px-8 py-8 sm:py-10">
          <div id="categories" class="flex flex-wrap gap-2"></div>
          <div class="mt-6" id="grid"></div>
        </div>
      </div>
    </section>

    <footer class="relative z-10">
      <div class="section-wide px-4 sm:px-6 lg:px-8 pb-14">
        <div class="text-xs text-neutral-500 dark:text-neutral-500">© <span id="year"></span> Aether.</div>
      </div>
    </footer>

    <script>
      window.AETHER_BROWSE_FULL = true;
    </script>
    <script src="./tools.js"></script>
    <script src="./site.js"></script>
  </body>
</html>

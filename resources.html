<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
  <link rel="stylesheet" href="./aether-theme.css" />
  <style>
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in-up { animation: fadeInUp 0.8s ease-out forwards; opacity: 0; }
    .delay-100 { animation-delay: 0.1s; }
    .delay-200 { animation-delay: 0.2s; }
    .delay-300 { animation-delay: 0.3s; }
    .font-bricolage { font-family: "Bricolage Grotesque", sans-serif !important; }
    .card-hover { transition: transform 0.2s ease, box-shadow 0.2s ease; }
    .card-hover:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,0.08); }
  </style>
  <title>Resource Library - Aether</title>
</head>
<body class="dark:bg-neutral-950 dark:text-neutral-50 font-nunito antialiased bg-white text-neutral-900">

  <header class="relative z-10 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 flex items-center justify-between animate-fade-in-up">
    <a href="index.html" class="text-base font-semibold tracking-tighter dark:text-white uppercase font-bricolage text-black">Aether</a>
    <nav class="hidden md:flex gap-6 text-sm font-medium text-neutral-500 dark:text-neutral-400">
      <a href="index.html#tools" class="dark:hover:text-white transition-colors hover:text-black">Tools</a>
      <a href="workspace.html" class="dark:hover:text-white transition-colors hover:text-black">Workspace</a>
      <a href="learn.html" class="dark:hover:text-white transition-colors hover:text-black">Learn</a>
      <a href="resources.html" class="dark:hover:text-white transition-colors hover:text-black border-b-2 border-black dark:border-white">Resources</a>
    </nav>
  </header>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">

    <!-- Hero -->
    <div class="text-center mb-12 animate-fade-in-up delay-100">
      <h1 class="text-4xl sm:text-5xl font-bold font-bricolage mb-4">Resource Library</h1>
      <p class="text-neutral-600 dark:text-neutral-400">Guides, prompt templates, creative inspiration & API docs — find what you need, instantly</p>
    </div>

    <!-- Search + Filters in a card — workspace style -->
    <div class="rounded-2xl border border-neutral-200/70 dark:border-neutral-800 bg-white/75 dark:bg-neutral-950/35 p-6 mb-8 animate-fade-in-up delay-200">
      <!-- Search row -->
      <div class="flex items-center gap-3 px-4 py-2.5 rounded-full border border-neutral-200 dark:border-neutral-700 bg-white dark:bg-neutral-950 mb-5 focus-within:ring-2 focus-within:ring-indigo-500/20 transition-shadow">
        <span class="material-symbols-outlined text-neutral-400" style="font-size:18px">search</span>
        <input
          id="searchInput"
          type="text"
          placeholder="Search by name, keyword, tag..."
          class="flex-1 bg-transparent outline-none text-sm text-neutral-900 dark:text-neutral-50 placeholder:text-neutral-400"
        />
        <button id="clearSearch" class="hidden text-neutral-400 hover:text-neutral-600 dark:hover:text-neutral-300 transition-colors">
          <span class="material-symbols-outlined" style="font-size:16px">close</span>
        </button>
      </div>

      <!-- Category tabs + difficulty -->
      <div class="flex flex-wrap items-center gap-3">
        <div class="flex flex-wrap gap-2 flex-1">
          <button type="button" data-cat="all" class="cat-btn px-4 py-2 rounded-full text-sm font-medium bg-black text-white dark:bg-white dark:text-black transition">
            All
          </button>
          <button type="button" data-cat="guide" class="cat-btn px-4 py-2 rounded-full text-sm font-medium border border-neutral-200 dark:border-neutral-800 hover:bg-neutral-50 dark:hover:bg-neutral-900 transition">
            Guides
          </button>
          <button type="button" data-cat="template" class="cat-btn px-4 py-2 rounded-full text-sm font-medium border border-neutral-200 dark:border-neutral-800 hover:bg-neutral-50 dark:hover:bg-neutral-900 transition">
            Templates
          </button>
          <button type="button" data-cat="inspiration" class="cat-btn px-4 py-2 rounded-full text-sm font-medium border border-neutral-200 dark:border-neutral-800 hover:bg-neutral-50 dark:hover:bg-neutral-900 transition">
            Inspiration
          </button>
          <button type="button" data-cat="api" class="cat-btn px-4 py-2 rounded-full text-sm font-medium border border-neutral-200 dark:border-neutral-800 hover:bg-neutral-50 dark:hover:bg-neutral-900 transition">
            API Docs
          </button>
        </div>
        <div class="flex items-center gap-2 text-sm text-neutral-500 dark:text-neutral-400">
          <span>Difficulty</span>
          <select id="difficultyFilter" class="px-3 py-2 rounded-full text-sm border border-neutral-200 dark:border-neutral-700 bg-white dark:bg-neutral-950 outline-none focus:ring-2 focus:ring-indigo-500/30">
            <option value="all">All</option>
            <option value="beginner">Beginner</option>
            <option value="intermediate">Intermediate</option>
            <option value="advanced">Advanced</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Count -->
    <div class="text-sm text-neutral-400 dark:text-neutral-500 mb-5 animate-fade-in-up delay-300">
      <span id="resultCount">Loading...</span>
    </div>

    <!-- Resource Grid -->
    <div id="resourceGrid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

    <!-- Empty state -->
    <div id="emptyState" class="hidden">
      <div class="rounded-2xl border border-neutral-200/70 dark:border-neutral-800 bg-white/75 dark:bg-neutral-950/35 p-16 text-center">
        <span class="material-symbols-outlined text-5xl text-neutral-300 dark:text-neutral-700">search_off</span>
        <p class="mt-4 text-neutral-500 dark:text-neutral-400">No resources found</p>
        <button onclick="resetFilters()" class="mt-5 px-5 py-2 rounded-full text-sm border border-neutral-200 dark:border-neutral-700 hover:bg-neutral-50 dark:hover:bg-neutral-800 transition">Clear filters</button>
      </div>
    </div>

  </main>

  <script src="./resources-content.js"></script>
  <script>
    const CATEGORY_LABELS = { guide: 'Guide', template: 'Template', inspiration: 'Inspiration', api: 'API Docs' };
    const DIFFICULTY_LABELS = { beginner: 'Beginner', intermediate: 'Intermediate', advanced: 'Advanced' };
    const DIFFICULTY_COLORS = {
      beginner: 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/30 dark:text-emerald-400',
      intermediate: 'bg-amber-100 text-amber-700 dark:bg-amber-900/30 dark:text-amber-400',
      advanced: 'bg-rose-100 text-rose-700 dark:bg-rose-900/30 dark:text-rose-400'
    };
    const CAT_COLORS = {
      guide: 'bg-indigo-100 text-indigo-700 dark:bg-indigo-900/30 dark:text-indigo-400',
      template: 'bg-violet-100 text-violet-700 dark:bg-violet-900/30 dark:text-violet-400',
      inspiration: 'bg-amber-100 text-amber-700 dark:bg-amber-900/30 dark:text-amber-400',
      api: 'bg-sky-100 text-sky-700 dark:bg-sky-900/30 dark:text-sky-400'
    };

    let currentCat = 'all';
    let currentDifficulty = 'all';
    let currentQuery = '';

    function getResources() {
      return (window.AETHER_RESOURCES && window.AETHER_RESOURCES.resources) || [];
    }

    function filterResources() {
      let items = getResources();
      if (currentCat !== 'all') items = items.filter(r => r.category === currentCat);
      if (currentDifficulty !== 'all') items = items.filter(r => r.difficulty === currentDifficulty);
      if (currentQuery) {
        const q = currentQuery.toLowerCase();
        items = items.filter(r =>
          r.title.toLowerCase().includes(q) ||
          r.tool.toLowerCase().includes(q) ||
          r.summary.toLowerCase().includes(q) ||
          (r.tags || []).some(t => t.toLowerCase().includes(q))
        );
      }
      return items;
    }

    function renderCard(r) {
      const catColor = CAT_COLORS[r.category] || '';
      const diffColor = DIFFICULTY_COLORS[r.difficulty] || '';
      const tagsHtml = r.tags && r.tags.length
        ? `<div class="flex flex-wrap gap-1.5 mt-4 pt-4 border-t border-neutral-100 dark:border-neutral-800/60">${r.tags.slice(0, 4).map(t => `<span class="text-xs px-2 py-0.5 rounded-full bg-neutral-100 dark:bg-neutral-800 text-neutral-500 dark:text-neutral-400">${t}</span>`).join('')}</div>`
        : '';

      return `
        <a href="resource-detail.html?id=${r.id}" class="block group card-hover rounded-2xl border border-neutral-200/70 dark:border-neutral-800 bg-white dark:bg-neutral-950 p-6 cursor-pointer">
          <div class="flex items-start justify-between gap-3 mb-4">
            <div class="w-10 h-10 rounded-xl bg-neutral-100 dark:bg-neutral-800 flex items-center justify-center flex-shrink-0">
              <span class="material-symbols-outlined text-neutral-600 dark:text-neutral-300" style="font-size:20px">${r.icon || 'article'}</span>
            </div>
            <div class="flex flex-wrap gap-1.5 justify-end">
              <span class="text-xs px-2 py-0.5 rounded-full font-medium ${catColor}">${CATEGORY_LABELS[r.category] || r.category}</span>
              <span class="text-xs px-2 py-0.5 rounded-full font-medium ${diffColor}">${DIFFICULTY_LABELS[r.difficulty] || r.difficulty}</span>
            </div>
          </div>
          <h3 class="font-semibold text-base mb-2 group-hover:text-indigo-600 dark:group-hover:text-indigo-400 transition-colors leading-snug">${r.title}</h3>
          <p class="text-sm text-neutral-500 dark:text-neutral-400 mb-0 line-clamp-2 leading-relaxed">${r.summary}</p>
          <div class="flex items-center justify-between text-xs text-neutral-400 dark:text-neutral-500 mt-4">
            <span class="flex items-center gap-1">
              <span class="material-symbols-outlined" style="font-size:13px">build</span>${r.tool}
            </span>
            <span class="flex items-center gap-1">
              <span class="material-symbols-outlined" style="font-size:13px">schedule</span>${r.readTime}
            </span>
          </div>
          ${tagsHtml}
        </a>
      `;
    }

    function render() {
      const items = filterResources();
      const grid = document.getElementById('resourceGrid');
      const empty = document.getElementById('emptyState');
      const count = document.getElementById('resultCount');
      count.textContent = `${items.length} resource${items.length !== 1 ? 's' : ''}`;
      if (items.length === 0) {
        grid.innerHTML = '';
        empty.classList.remove('hidden');
      } else {
        empty.classList.add('hidden');
        grid.innerHTML = items.map(renderCard).join('');
      }
    }

    function resetFilters() {
      currentCat = 'all';
      currentDifficulty = 'all';
      currentQuery = '';
      document.getElementById('searchInput').value = '';
      document.getElementById('difficultyFilter').value = 'all';
      document.getElementById('clearSearch').classList.add('hidden');
      syncCatButtons();
      render();
    }

    function syncCatButtons() {
      document.querySelectorAll('.cat-btn').forEach(b => {
        const active = b.dataset.cat === currentCat;
        b.className = `cat-btn px-4 py-2 rounded-full text-sm font-medium transition ${
          active
            ? 'bg-black text-white dark:bg-white dark:text-black'
            : 'border border-neutral-200 dark:border-neutral-800 hover:bg-neutral-50 dark:hover:bg-neutral-900'
        }`;
      });
    }

    document.querySelectorAll('.cat-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        currentCat = btn.dataset.cat;
        syncCatButtons();
        render();
      });
    });

    document.getElementById('searchInput').addEventListener('input', e => {
      currentQuery = e.target.value.trim();
      document.getElementById('clearSearch').classList.toggle('hidden', !currentQuery);
      render();
    });

    document.getElementById('clearSearch').addEventListener('click', () => {
      currentQuery = '';
      document.getElementById('searchInput').value = '';
      document.getElementById('clearSearch').classList.add('hidden');
      render();
    });

    document.getElementById('difficultyFilter').addEventListener('change', e => {
      currentDifficulty = e.target.value;
      render();
    });

    render();
  </script>
</body>
</html>

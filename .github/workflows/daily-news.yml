# 每日同步 RSS 新闻到 Supabase（需先在仓库 Secrets 中配置）
# Settings → Secrets and variables → Actions 添加：
#   SUPABASE_URL
#   SUPABASE_SERVICE_ROLE_KEY
name: Daily news sync

on:
  schedule:
    # UTC 每天 01:00（约北京时间 09:00，可按需改 cron）
    - cron: "0 1 * * *"
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Sync RSS → Supabase
        env:
          SUPABASE_URL: ${{ https://qddlhzhgcquamwuwggnw.supabase.co }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkZGxoemhnY3F1YW13dXdnZ253Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NDk0OTE1MiwiZXhwIjoyMDkwNTI1MTUyfQ.8AnS-D7mAAMeu0XHqMAixrM6KeYCrA3CBsPq8ZTQmpY }}
          NEWS_RSS_URLS: ${{ secrets.NEWS_RSS_URLS }}
        run: node scripts/fetch-daily-news.mjs

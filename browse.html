<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700&display=swap" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    <link rel="stylesheet" href="./aether-theme.css" />
    <style>
      .font-bricolage { font-family: "Bricolage Grotesque", sans-serif !important; }
      .tool-card { transform: translateZ(0); }
      .tool-card:hover { transform: scale(1.03); }
      .tool-img-a { opacity: 1; }
      .tool-img-b { opacity: 0; }
      .tool-card:hover .tool-img-a { opacity: 0; transform: scale(1.05) rotate(-0.25deg); }
      .tool-card:hover .tool-img-b { opacity: 1; transform: scale(1.05) rotate(0.25deg); }
      .tool-img-layer { transition: opacity 260ms ease, transform 420ms ease; }
      .section-wide {
        width: 100%;
        max-width: min(88rem, calc(100vw - 2rem));
        margin-left: auto;
        margin-right: auto;
      }
    </style>
    <title>Browse all tools · Aether</title>
  </head>
  <body class="dark:bg-neutral-950 dark:text-neutral-50 font-nunito antialiased selection:bg-neutral-200 dark:selection:bg-neutral-800 relative min-h-screen overflow-x-hidden bg-white text-neutral-900">
    <header class="relative z-10 section-wide px-4 sm:px-6 lg:px-8 py-8 flex items-center justify-between gap-4">
      <a href="index.html" class="text-base font-semibold tracking-tighter dark:text-white uppercase font-bricolage text-black hover:opacity-80 transition-opacity inline-flex items-center gap-1">
        <span class="material-symbols-outlined text-xl" aria-hidden="true">home</span>Aether
      </a>
      <h1 class="text-lg sm:text-xl aether-heading aether-heading-gradient truncate inline-flex items-center gap-1 max-w-[min(280px,40vw)] sm:max-w-md">
        <span class="material-symbols-outlined text-2xl shrink-0 text-indigo-500 dark:text-indigo-400" aria-hidden="true">apps</span>
        <span class="truncate">All tools</span>
      </h1>
      <a href="index.html" class="rounded-full px-5 py-2 text-sm font-medium border border-neutral-200/80 dark:border-neutral-800 text-neutral-600 dark:text-neutral-300 hover:bg-neutral-50 dark:hover:bg-neutral-900 transition-colors shrink-0 inline-flex items-center gap-1">
        <span class="material-symbols-outlined text-base" aria-hidden="true">arrow_back</span>Home
      </a>
    </header>

    <section id="tools" class="relative z-10 pb-16">
      <div class="section-wide px-4 sm:px-6 lg:px-8">
        <div class="tools-card-shell">
          <div class="px-4 sm:px-6 lg:px-8 pt-8 pb-6">
            <div class="flex flex-col lg:flex-row lg:items-end lg:justify-between gap-6">
              <div>
                <h2 class="text-2xl sm:text-3xl aether-heading aether-heading-gradient inline-flex flex-wrap items-center gap-2">
                  <span class="material-symbols-outlined text-3xl text-indigo-500 dark:text-indigo-400" aria-hidden="true">apps</span>
                  AIGC 工具导航
                </h2>
              </div>
              <div class="flex flex-col sm:flex-row gap-3 w-full lg:w-auto">
                <div class="relative w-full sm:w-[320px]">
                  <div class="absolute inset-y-0 left-3 flex items-center text-neutral-400 pointer-events-none">
                    <span class="material-symbols-outlined text-lg" aria-hidden="true">search</span>
                  </div>
                  <input id="search" type="search" class="w-full pl-10 pr-4 py-2.5 rounded-full border border-neutral-200/70 dark:border-neutral-700 bg-white/90 dark:bg-neutral-950/50 text-sm outline-none focus:ring-2 focus:ring-indigo-500/30" autocomplete="off" />
                </div>
                <div class="flex flex-wrap gap-2">
                  <button id="clearFilters" type="button" class="rounded-full px-5 py-2.5 border border-neutral-200/80 dark:border-neutral-700 text-sm font-medium text-neutral-700 dark:text-neutral-200 hover:bg-neutral-50 dark:hover:bg-neutral-800/80 transition-colors bg-white/90 dark:bg-neutral-950/40 inline-flex items-center gap-1">
                    <span class="material-symbols-outlined text-base" aria-hidden="true">filter_alt_off</span>清除筛选
                  </button>
                </div>
              </div>
            </div>
          </div>
          <div class="px-4 sm:px-6 lg:px-8 pb-8 sm:pb-10 pt-2">
            <div id="categories" class="flex flex-wrap gap-2"></div>
            <div class="mt-6" id="grid"></div>
          </div>
        </div>
      </div>
    </section>

    <footer class="relative z-10">
      <div class="section-wide px-4 sm:px-6 lg:px-8 pb-14">
        <div class="text-xs text-neutral-500 dark:text-neutral-500">© <span id="year"></span> Aether.</div>
      </div>
    </footer>

    <script>
      window.AETHER_BROWSE_FULL = true;
    </script>
    <script src="./tools.js"></script>
    <script src="./site.js"></script>
  </body>
</html>

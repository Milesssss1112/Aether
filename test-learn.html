<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <title>教程测试</title>
</head>
<body class="bg-white p-8">
  <h1 class="text-2xl font-bold mb-4">教程列表测试</h1>
  <div id="content"></div>

  <script>
    fetch('./data/learn-content.json')
      .then(r => r.json())
      .then(data => {
        console.log('数据加载成功:', data);
        const html = data.articles.map(a => `
          <div class="border p-4 mb-4 rounded">
            <h3 class="font-bold">${a.title}</h3>
            <p class="text-sm text-gray-600">${a.summary}</p>
            <span class="text-xs bg-blue-100 px-2 py-1 rounded">${a.type}</span>
          </div>
        `).join('');
        document.getElementById('content').innerHTML = html;
      })
      .catch(e => {
        console.error('加载失败:', e);
        document.getElementById('content').innerHTML = '加载失败: ' + e.message;
      });
  </script>
</body>
</html>
